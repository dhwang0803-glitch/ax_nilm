data:
  root: "datasets"
  raw_dir: "원천데이터"
  label_dir: "라벨데이터"
  aggregate_channel: "ch01"

gcs:
  bucket: "ax-nilm-data-dhwang0803-us"
  raw_prefix: "nilm/training_dev10"
  label_file: "nilm/labels/training.parquet"

split:
  train:
    - house_011
    - house_015
    - house_016
    - house_017
    - house_033
    - house_039
    - house_054
    - house_063
  val:
    - house_049
  test:
    - house_067

window:
  size: 1024          # samples (34초 @ 30Hz)
  stride: 30          # samples (1초 이동)
  sampling_rate: 30
  event_context: 20   # 전환점 ±20 윈도우 (≈ ±20초). null 이면 전수 슬라이딩
  steady_stride: 600  # 정상 구간 20초마다 1개. null 이면 stride × 20 자동 설정

# 멀티스케일 그룹별 설정 (NILMDataset의 resample_hz + appliance_group 파라미터에 대응)
# A_heating + B_step → fast / C_cycle → slow / D_always → always_on
groups:
  fast:
    resample_hz: 30
    window_size: 1024   # 34초 @ 30Hz
    stride: 30
    event_context: 20
    steady_stride: 600
  slow:
    resample_hz: 1
    window_size: 1800   # 30분 @ 1Hz
    stride: 30          # 30초 이동
    event_context: 20   # ±20 윈도우 = ±600초 = ±10분
    steady_stride: 60   # 30분마다 1개
  always_on:
    resample_hz: 1
    window_size: 1800
    stride: 30
    event_context: 20
    steady_stride: 60

# 가전 이름은 라벨 JSON의 meta.name 값과 일치해야 함
# 인덱스(0~21)가 모델 출력 채널 순서로 고정됨
appliances:
  - "TV"                    # 0  type1
  - "전기포트"               # 1  type1
  - "선풍기"                 # 2  type1
  - "의류건조기"             # 3  type2
  - "전기밥솥"               # 4  type2
  - "식기세척기/건조기"       # 5  type2
  - "세탁기"                 # 6  type2
  - "헤어드라이기"           # 7  type2
  - "에어프라이어"           # 8  type2
  - "진공청소기(유선)"        # 9  type2
  - "전자레인지"             # 10 type2
  - "에어컨"                 # 11 type3
  - "인덕션(전기레인지)"      # 12 type3
  - "전기장판/담요"          # 13 type3
  - "온수매트"               # 14 type3
  - "제습기"                 # 15 type3
  - "컴퓨터"                 # 16 type3
  - "공기청정기"             # 17 type3
  - "전기다리미"             # 18 type3
  - "일반 냉장고"            # 19 type4
  - "김치냉장고"             # 20 type4
  - "무선공유기/셋톱박스"    # 21 type4
