training:
  epochs: 25             # 15 → 25: window=1024 scratch 수렴에 더 많은 epoch 확보
  batch_size: 256        # seq2point, cnn_tda 기본값
  batch_size_bert: 64   # bert4nilm: window=1024 quadratic attention 메모리 제약
  learning_rate: 0.0005  # 0.001 → 0.0005: EXP1 scratch 안정적 수렴
  resume_lr_factor: 0.2   # resume 시 LR 배율 (0.0005 × 0.2 = 0.0001)
  early_stopping_patience: 5
  pos_weight_max: 50        # pos_weight clamp 상한 (기존 20 → 희귀 이벤트 가전 커버)
  loss_weights:
    mse: 0.00005  # 0.0001 → 0.00005: 냉장고 등 고전력 가전 MSE 폭발 완화
    bce: 1.0      # cnn_tda ON/OFF 분류 로짓 BCE 가중치

optimizer:
  name: "adam"
  weight_decay: 0.0001

scheduler:
  name: "reduce_on_plateau"
  factor: 0.5
  patience: 2   # early_stopping_patience(5)보다 작게 — LR 감소 후 재학습 기회 확보

# 주차별 추가학습 실험 설정
# EXP1: 처음부터 학습 (resume_from: null)
# EXP2+: 이전 EXP 체크포인트에서 이어서 학습
experiments:
  EXP1:
    week: 1          # house별 시작일 기준 1~7일차
    resume_from: null
  EXP2:
    week: 2          # 8~14일차
    resume_from: "EXP1"
  EXP3:
    week: 3          # 15~21일차
    resume_from: "EXP2"
  EXP4:
    week: 4          # 22~28일차
    resume_from: "EXP3"

# Val/Test 평가는 학습 기간과 무관하게 전체 데이터 사용 (different houses → no leakage)
eval:
  date_range: null   # null = 전체 기간

# 포화점 판단 기준: 이전 EXP 대비 Val MAE 개선율 < 이 값이면 포화로 판단
saturation_threshold: 0.05   # 5%

# 가전별 MSE loss 스케일 (1.0 = 기본, >1.0 = 해당 가전 오차 더 강하게 패널티)
appliance_loss_scale:
  "인덕션(전기레인지)": 2.0  # RMSE 247~325W — 절대전력 최고 → loss 강화
