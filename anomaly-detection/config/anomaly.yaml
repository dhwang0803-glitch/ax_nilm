# anomaly-detection 설정

thresholds:
  consumption_increase_pct: 0.20   # 소비량 증가 임계값 (MEDIUM 기준)
  consumption_high_pct: 0.35       # 소비량 증가 임계값 (HIGH 기준)
  runtime_increase_pct: 0.30       # 작동시간 증가 임계값
  runtime_high_pct: 0.50
  peak_increase_pct: 0.30          # 최대 전력 증가 임계값
  peak_high_pct: 0.50
  min_confidence: 0.60             # NILM 결과 최소 신뢰도 (미달 시 제외)

poc_mode:
  enabled: true
  baseline_weeks: 3                # PoC: AI Hub 31일 데이터 → 3주 베이스라인
  eval_weeks: 1                    # PoC: 마지막 1주 평가

production_mode:
  baseline_months: 3               # 실제: 3개월 베이스라인
  eval_weeks: 1

pattern_detector:
  isolation_forest:
    contamination: 0.05
    n_estimators: 100
    random_state: 42
  periodicity_std_multiplier: 2.0
