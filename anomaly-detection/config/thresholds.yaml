# 가전별 상태 임계값 (State Thresholds)
# 출처: nilm-engine/labeling/state_labeling.md EDA 결과 (K-Means + Valley Detection)
# 이상치 처리: pseudo_labeler에서 동적 계산 (최고 중심값 × outlier_multiplier)
#   - hard_max 명시된 가전: 해당 값으로 필터 (EDA에서 채널 오염 확인된 가전)
#   - hard_max 없는 가전: 최고 중심값 × outlier_multiplier(기본 2.0)

global:
  min_on_power: 5.0        # W > 5W 이상만 on-period로 처리
  outlier_multiplier: 2.0  # hard_max 없는 가전의 이상치 상한 계수

appliances:

  에어컨:
    tda_mode: true   # TDA-K=2 (W-K=3 과분할 — fan_low/cool_medium 위상 동일)
    hard_max: 50.0   # EDA 채널 오염 필터 기준 (비하절기 데이터)
    # ⚠️ 하절기 데이터 추가 시 재클러스터링 필요 (냉방 모드: 500~2000W)
    states:
      - name: 냉방
        min_w: 0.0
        max_w: 15.0
        center_w: 6.8
      - name: 예열
        min_w: 15.0
        max_w: null
        center_w: 20.0

  김치냉장고:
    tda_mode: true   # TDA-K=3 = W-K=3 일치
